<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- NOTE: No meta-refresh here — it would redirect WITHOUT auth tokens (hash fragment is lost) -->

    <title>Opening Ruddy App...</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #FFF5E6;
            color: #4F2C1E;
            margin: 0;
            text-align: center;
        }

        .loader {
            border: 4px solid #F0E6D3;
            border-top: 4px solid #1A96E8;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px;
        }

        p {
            color: #4F2C1E80;
            margin: 0 0 32px;
            font-weight: 500;
        }

        .btn {
            background: #1A96E8;
            color: white;
            padding: 16px 36px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(26, 150, 232, 0.4);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <h1>Opening Ruddy Workspace</h1>
    <p>We're sending you back to the app...</p>

    <a id="manual-btn" href="duckdb-analytics://success" class="btn">Open Ruddy App Manually</a>

    <div id="copy-area"
        style="display: none; margin-top: 40px; padding: 20px; background: rgba(26, 150, 232, 0.05); border-radius: 20px; border: 1px dashed rgba(26, 150, 232, 0.3); max-width: 400px;">
        <p id="token-status" style="font-size: 13px; margin-bottom: 12px; color: #1A96E8; font-weight: 700;">Detection
            Status...</p>
        <button id="copy-btn" class="btn"
            style="padding: 12px 24px; font-size: 13px; background: #FFF; color: #1A96E8; border: 2px solid #1A96E8; box-shadow: none;">Copy
            Manual Link For App</button>
        <p id="copy-status" style="font-size: 11px; margin: 8px 0 0; color: #1A96E8; font-weight: 600;"></p>
        <p style="font-size: 10px; margin-top: 10px; color: #4F2C1E80;">If the app didn't open automatically, click the
            button above and paste the result into the app's Diagnostics box.</p>
    </div>

    <script>
        window.onload = function () {
            const hashContent = window.location.hash.replace(/^#/, '');
            const searchContent = window.location.search.replace(/^\?/, '');
            const allParams = [searchContent, hashContent].filter(Boolean).join('&');

            const appUrl = allParams
                ? "duckdb-analytics://success?" + allParams
                : "duckdb-analytics://success";

            const btn = document.getElementById('manual-btn');
            const copyArea = document.getElementById('copy-area');
            const copyBtn = document.getElementById('copy-btn');
            const copyStatus = document.getElementById('copy-status');
            const tokenStatus = document.getElementById('token-status');

            btn.href = appUrl;

            if (allParams.includes('access_token=')) {
                tokenStatus.innerText = "✅ Login Tokens Detected!";
                tokenStatus.style.color = "#10b981";
            } else if (allParams.includes('error=')) {
                tokenStatus.innerText = "❌ Auth Error Found in URL";
                tokenStatus.style.color = "#ef4444";
            } else {
                tokenStatus.innerText = "⚠️ No Login Tokens Found!";
                tokenStatus.style.color = "#f59e0b";
            }

            try {
                window.location.href = appUrl;
            } catch (e) {
                console.log("Jump blocked.");
            }

            setTimeout(() => {
                copyArea.style.display = 'block';
                btn.style.transform = "scale(1.1)";
            }, 800);

            copyBtn.onclick = function () {
                navigator.clipboard.writeText(appUrl).then(() => {
                    copyStatus.innerText = "✅ DEEP LINK COPIED! Now paste into the app.";
                    copyBtn.innerText = "Copied!";
                    setTimeout(() => {
                        copyStatus.innerText = "";
                        copyBtn.innerText = "Copy Manual Link For App";
                    }, 4000);
                });
            };
        };
    </script>
</body>

</html>
