<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- NOTE: No meta-refresh here — it would redirect WITHOUT auth tokens (hash fragment is lost) -->

    <title>Opening Ruddy App...</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #FFF5E6;
            color: #4F2C1E;
            margin: 0;
            text-align: center;
        }

        .loader {
            border: 4px solid #F0E6D3;
            border-top: 4px solid #1A96E8;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px;
        }

        p {
            color: #4F2C1E80;
            margin: 0 0 32px;
            font-weight: 500;
        }

        .btn {
            background: #1A96E8;
            color: white;
            padding: 16px 36px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(26, 150, 232, 0.4);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <h1>Opening Ruddy Workspace</h1>
    <p>We're sending you back to the app...</p>

    <a id="manual-btn" href="duckdb-analytics://success" class="btn">Open Ruddy App Manually</a>

    <script>
        // 🟢 PART 2: The "Smart" Jump (Preserves Login Tokens & Session IDs)
        window.onload = function () {
            // Supabase implicit flow puts tokens in the hash (#access_token=...).
            // macOS can strip hash fragments when dispatching custom URL scheme deep links,
            // so we flatten everything into query params (?access_token=...) which are always preserved.
            const hashContent = window.location.hash.replace(/^#/, '');
            const searchContent = window.location.search.replace(/^\?/, '');
            const allParams = [searchContent, hashContent].filter(Boolean).join('&');
            const appUrl = allParams
                ? "duckdb-analytics://success?" + allParams
                : "duckdb-analytics://success";

            const btn = document.getElementById('manual-btn');

            // 1. Update the manual button immediately
            btn.href = appUrl;

            // 2. Try the automatic jump
            try {
                window.location.href = appUrl;
            } catch (e) {
                console.log("Automatic jump blocked. User click required.");
            }

            // 3. Highlight button if jump is blocked or delayed
            setTimeout(() => {
                btn.style.transform = "scale(1.1)";
                btn.style.boxShadow = "0 8px 25px rgba(26, 150, 232, 0.6)";
            }, 1000);
        };
    </script>
</body>

</html>
